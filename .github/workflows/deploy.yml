name: Deploy blueprints to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only need to read the repo; deployment goes to Cloudflare via API token.
permissions:
  contents: read

# Serialize deploys so overlapping pushes don't clash.
concurrency:
  group: cloudflare-pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: requirements.txt

      # No Lean, no elan, no lake, no Mathlib anywhere in this job.
      - name: Install graphviz
        run: sudo apt-get update && sudo apt-get install -y graphviz libgraphviz-dev

      # plasTeX needs a LaTeX installation (kpsewhich + the class/package files)
      # to resolve \documentclass{report} and \usepackage{amssymb,amsmath,
      # amsthm,hyperref}; without it the web build fails. Math itself is still
      # rendered client-side by MathJax -- this is just for parsing.
      - name: Install LaTeX (required by plasTeX even for the web build)
        run: sudo apt-get install -y texlive-latex-base texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # Use build.py itself so the "needs TeX?" decision uses the exact same
      # meta.yml interpretation as the build (one source of truth).
      - name: Detect whether any blueprint needs a PDF (and therefore TeX)
        id: pdf
        run: |
          need_tex="$(python scripts/build.py --print-needs-tex)"
          echo "need_tex=$need_tex" >> "$GITHUB_OUTPUT"
          echo "needs TeX: $need_tex"

      - name: Install extra TeX for PDF builds (only when a blueprint sets build_pdf)
        if: steps.pdf.outputs.need_tex == 'true'
        run: sudo apt-get install -y texlive-xetex latexmk

      - name: Build site
        run: python scripts/build.py --strict

      # Direct Upload to Cloudflare Pages.
      # Required repo secrets:
      #   CLOUDFLARE_API_TOKEN  -- token with Cloudflare Pages edit permission
      #   CLOUDFLARE_ACCOUNT_ID -- your Cloudflare account id
      # Sanity check: fail loudly (and visibly) if the build produced no site/.
      - name: Verify site/ was built
        run: |
          echo "Contents of site/:"
          ls -la site || { echo "::error::site/ does not exist"; exit 1; }
          test -f site/index.html || { echo "::error::site/index.html missing"; exit 1; }

      # Create the Pages project on first deploy if it does not already exist.
      # This avoids the Cloudflare dashboard's one-time manual upload flow.
      - name: Ensure Cloudflare Pages project exists
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx --yes wrangler@4 pages project create auto-blueprint --production-branch=main

      # Call wrangler directly so the `site` directory argument is passed verbatim.
      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@4 pages deploy site --project-name=auto-blueprint --branch=main
